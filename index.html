<!DOCTYPE html>

<style>

body {
    margin: 0;
    font-family: Roboto, Arial, sans-serif;
}

/* HEADER */
header {
    position: fixed;
    top: 0;
    width: 100%;
    height: 90px;
    background: #0b3c5d;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    box-sizing: border-box;
    z-index: 1000;
}

.logo { font-size: 22px; font-weight: bold; }

.header-right {
    display: flex;
    align-items: center;
    gap: 20px;
}

/* MENU */
nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
    margin: 0;
    padding: 0;
}
nav li { cursor: pointer; font-weight: bold; }
nav li:hover { text-decoration: underline; }

/* LOGIN */
.login-btn, .logout-btn {
    background: #e63946;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
}

.justificado {
    text-align: justify;
    text-justify: inter-word;
}

/* CONTENIDO */
main {
    margin-top: 100px;
    padding: 30px;
    background: #f4f4f4;
    min-height: 100vh;    
    min-height: calc(100vh - 100px);
    background-image: url('LogoNegro.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;  /* Hace que quede fija al hacer scroll */
}

/* MODAL ANIMADO */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
}

.modal.show {
    display: flex;
    animation: fadeIn .3s;
}

.modal-content {
    background: white;
    padding: 30px;
    width: 300px;
    border-radius: 6px;
    animation: slideDown .4s;
    position: relative;
}

.modal-content input {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
}

.modal-content button {
    width: 100%;
    padding: 10px;
    background: #0b3c5d;
    color: white;
    border: none;
    cursor: pointer;
}

.close {
    position: absolute;
    top: 8px;
    right: 10px;
    cursor: pointer;
}

.error {
    color: red;
    font-size: 14px;
}

/* ANIMACIONES */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideDown {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}


/* CONTENEDOR DEL SLIDER */
.slider {
  position: relative;
  width: 100%;
  height: 40vh;
  overflow: hidden;
}

.slides {
  display: flex;
  width: 600%;
/*  height: 100%; */
  animation: slide 24s infinite;
}

.slides img {
  width: 100%;
/*  height: 100%; */
  object-fit: cover;
}

.slide {
  width: 100%;
}

/* ANIMACIÓN */
@keyframes slide {
/*    0% { margin-left: 0%; }
    20% { margin-left: 0%; }

    25% { margin-left: -100%; }
    45% { margin-left: -100%; }

    50% { margin-left: -200%; }
    70% { margin-left: -200%; }

    75% { margin-left: -300%; }
    95% { margin-left: -300%; }

    100% { margin-left: 0%; } */

  0%   { margin-left: 0%; }
  16%  { margin-left: 0%; }

  20%  { margin-left: -100%; }
  32%  { margin-left: -100%; }

  36%  { margin-left: -200%; }
  48%  { margin-left: -200%; }

  52%  { margin-left: -300%; }
  64%  { margin-left: -300%; }

  68%  { margin-left: -400%; }
  80%  { margin-left: -400%; }

  84%  { margin-left: -500%; }
  96% { margin-left: -500%; }

  100% { margin-left: 0%; }
}

footer {
    text-align: center;
    padding: 10px;
    background: #222;
    color: white;
    margin-top: 10px;
}
</style>
</head>

<script>

/* ===== DATA ===== */
const textos = {
    es: {
        menu: ["Inicio", "Cursos", "Casos Exitosos", "Qui&eacute;nes Somos", "Cont&aacute;ctenos", "&Aacute;rea Alumnos"],
        contenido: {
            inicio: '<div class="slider"><div class="slides"><div class="slide"><img src="Italia15.jpg" alt="Italia 6"></div><div class="slide"><img src="Italia10.jpg" alt="Italia 10"></div><div class="slide"><img src="Italia7.jpg" alt="Italia 7"></div><div class="slide"><img src="Italia13.jpg" alt="Italia 13"></div><div class="slide"><img src="Italia6.jpg" alt="Italia 3"></div><div class="slide"><img src="Italia5.jpg" alt="Italia 5"></div></div></div><center><br><h1>Bienvenidos</h1><table border=0 width=90% cellpadding="1" cellspacing="1"><tr><td><p class="justificado">Descubrí el idioma de la literatura, el arte y la pasión. En nuestra academia te invitamos a sumergirte en el italiano de una forma auténtica, dinámica y completamente práctica, ideal tanto para quienes empiezan desde cero como para quienes desean perfeccionar su nivel.</p><p class="justificado">Aprender italiano es mucho más que estudiar un idioma: es abrir la puerta a la historia de Roma, al encanto de Florencia, a la magia de Venecia y a una de las gastronomías más reconocidas del mundo. Nuestro enfoque humanístico/afectivo de la glotodidáctica combina Lengua y Cultura italiana desde el primer día.</p><p class="justificado">Contamos con cursos especializados, grupos reducidos y clases diseñadas para que avances de manera rápida y efectiva. Además, ofrecemos la modalidad online para poder adaptarnos mejor a tus tiempos y objetivos.</p><p class="justificado">Ya sea que quieras viajar, estudiar en Italia o simplemente disfrutar del idioma, este es el lugar para comenzar tu camino. Te compartimos material exclusivo y te brindamos la correcta preparación por nivel para las <font color=blue><u>Certificaciones internacionales</u></font> (QCER).</p></td></tr></table><p><center><br><table border=2 width=50% cellpadding="1" cellspacing="1"><tr><td><center><table border=0 width=100% cellpadding="10" cellspacing="0"><tr><td width="120" valign="middle"><font color=blue><u>Niveles QCER:</u></font></td><td align="left" valign="middle"><font color=blue>Cuadro común europeo de referencia para el conocimiento de los idiomas.</font></td></tr></table></center></td></tr></table></center></p><br><table border=0 width=90% cellpadding="1" cellspacing="1"><tr><td><p class="justificado">En Europa, en la comunidad del aprendizaje de las lenguas, a menudo escuchamos las personas hablar del propio nivel lingüístico. Por ejemplo: “hablo francés con un nivel B1” o “estoy frecuentando un curso de inglés, estoy en una clase di nivel A2 de gramática y conversación”.</p></td></tr></table><br><p><center><table border=0 width=90% cellpadding="10" cellspacing="3"><tr><td align=center valign="middle"><img src="CuadroQCER.jpg" alt="Cuadro QCER"></td><td valign="middle"><br><br><h2>¿Qué significa B1 o A2?</h2><p class="justificado">Estos títulos son los niveles de competencia lingüística en el sistema del <b>Cuadro común europeo de referencia para el conocimiento de las lenguas</b>, abreviado en italiano <b>QCER</b>, y son usados por los estudiantes para medir el propio nivel de conocimiento de una determinada lengua. QCER es una línea-guía que viene usada para describir los objetivos alcanzados por quien estudia una lengua extranjera en toda Europa y siempre más en otros países.</p><br><font color=white>.<br>.</font></td></tr></table></p><br><h2>¿Cuáles son los varios niveles QCER?</h2><table border=0 width=90% cellpadding="1" cellspacing="1"><tr><td><p class="justificado">Los seis niveles al interno del QCER son <b>A1</b>, <b>A2</b>, <b>B1</b>, <b>B2</b>, <b>C1</b>, y <b>C2</b>. Estos seis niveles de referencia están ampliamente reconocidos por los estándares europeos para evaluar las competencias individuales en cuarenta lenguas diferentes. Cada nivel está dividido en cuatro tipos de competencias (habilidades lingüísticas) que describen lo que debería ser capaz un estudiante por lo que respecta la <b>lectura</b>, la <b>escucha</b>, la <b>conversación</b> y la <b>escritura</b>.</td></tr></table></p><br><p><table border=1 width=95% cellpadding="10" cellspacing="3"><tr><td align=center valign="middle"><h2>Los esperamos en nuestra “Academia Italiana Online” para descubrir junt@s un nuevo mundo, rico de sentimientos y emociones que llenan los corazones de tod@s!</h2></td></tr></table><br><br></p>',
            cursos: '<img src="Cursos.jpg" width="100%" alt="Cursos"><center><br><!h1Cursos/h1><br><h1>Cursos: regulares e intensivos</h1><br></center><p><br><p><font size=+2> &nbsp; <u>Nivel inicil: A1</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Domani 1.jpg"><br>Domani 1</td><td><font size=+2><strong>A1 – Principiante (Nivel de Descubrimiento)</strong></font><p></p>En el nivel A1 del QCER, el estudiante de idiomas:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>es capaz de comprender y usar expresiones básicas necesarias para satisfacer necesidades concretas e inmediatas.</li></td></tr><tr><td valign=center><li>es capaz de presentarse a otras personas, hacer y responder preguntas personales, como dónde vive, a quién conoce y qué posee.</li></td></tr><tr><td valign=center><li>es capaz de interactuar solo si la otra persona habla despacio y con claridad.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de italiano de nivel A1:</u> Consulta disponibilidad.</font><br><br></td></tr></table><br><br><hr><br><p><font size=+2> &nbsp; <u>Nivel preintermedio: A2</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Domani 2.jpg"><br>Domani 2</td><td><font size=+2><strong>A2 – Elemental (Nivel de supervivencia)</strong></font><p></p>En el nivel A2 del QCER, el estudiante de idiomas:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>es capaz de comprender frases y expresiones de uso común relacionadas con áreas generales como la familia, el trabajo o las compras.</li></td></tr><tr><td valign=center><li>es capaz de comunicarse en actividades sencillas y rutinarias que requieren un intercambio simple de información sobre temas como la familia o el uso común.</li></td></tr><tr><td valign=center><li>Puede describir en términos sencillos aspectos de su entorno, su entorno inmediato y sus necesidades inmediatas.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de italiano de nivel A2:</u> Preguntar por disponibilidad.</font><br><br></td></tr></table><br><br><hr><br><p><font size=+2> &nbsp; <u>Nivel Intermedio: B1</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Domani 3.jpg"><br>Domani 3</td><td><font size=+2><strong>B1 – Independiente (Nivel Umbral)</strong></font><p></p>En el nivel B1 del QCER, el estudiante de italiano:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>Puede comprender los puntos principales de textos claros sobre temas familiares que se encuentran habitualmente en el trabajo, la escuela o el ocio.</li></td></tr><tr><td valign=center><li>Puede desenvolverse en situaciones que probablemente surjan al viajar a zonas donde se habla el idioma.</li></td></tr><tr><td valign=center><li>Puede producir discursos sencillos y coherentes sobre temas familiares o de interés personal.</li></td></tr><tr><td valign=center><li>Puede describir experiencias y acontecimientos, esperanzas y ambiciones, así como opiniones o planes a corto plazo.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de italiano de nivel B1:</u> Consulta disponibilidad.</font><br><br></td></tr></table><br><br><hr><br><br><!center><font size=+2> &nbsp; <u>Curso de Consolidación y Conversación: Nivel B1 para Adultos</u></font><br><br><table border=0><tr><td> &nbsp; &nbsp; Tras alcanzar el nivel B1, el estudiante de idiomas:<br><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>puede consolidar sus conocimientos gramaticales.</li></td></tr><tr><td valign=center><li>puede mejorar sus habilidades comunicativas.</li></td></tr><tr><td valign=center><li>es capaz de producir diversos tipos de discurso, incluyendo expresiones profesionales.</li></td></tr><tr><td valign=center><li>es capaz de percibir diferencias en contextos concretos o abstractos.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el Curso de Consolidación y Conversación de Nivel B1:</u> Consulta disponibilidad.</font></td></tr></table><!/center><br><br><hr><br><br><!h1><font size=+2> &nbsp; <u>Curso de preparación para la certificación: Nivel B1 Adultos</u></font><!/h1><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Nuovo Esame B1.jpg"><br>Quaderno PLIDA B1</td><td><p></p>Tras alcanzar el nivel B1, el estudiante de idiomas:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>pueden validar sus conocimientos del nivel intermedio B1 mediante la certificación PLIDA, en la sede de la Asociación Dante Alighieri.</li></td></tr><tr><td valign=center><br>Los centros de certificación PLIDA se encuentran en todo el mundo; visite <a href="http://www.plida.it" target="_blank">www.plida.it</a></td></tr></table></center><p></p>» <font color=blue><u>Pruebe el curso de preparación para la certificación de nivel B1:</u> Consulte la disponibilidad.</font><br><br></td></tr></table><br><br><hr><br><br><center><table border=1 cellspacing="1"><tr><td><table border=0 cellspacing="1"><tr><td> &nbsp; &nbsp; &nbsp; &nbsp; </td><td><table border=0 cellspacing="1"><tr><td valign=center><h1><i>La Certificación PLIDA permite a los estudiantes:</i></h1></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Solicitar “Permesso di soggiorno in Italia” (desde el nivel A2);</li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Solicitar “Permesso di lungo soggiorno in Italia”, ósea un permiso de estadía con el propósito de establecerse en el país (desde el nivel A2); &nbsp; &nbsp; </li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Inscribirse en las Universidades para realizar carreras universitarias (el nivel solicitado varia en base a los ateneos y al tipo de facultad);  &nbsp; </li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Solicitar visto de ingreso por razones de estudio;</li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Postularse en empresas para trabajar en relación de dependencia.;</li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Además, se podrá solicitar Ciudadanía italiana. </li><br></td></tr></table></td></tr></table></td></tr></table></center><br><br><hr><br><p><font size=+2> &nbsp; <u>Nivel Intermedio Alto: B2 Adultos</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Nuovo Magari B2.jpg"><br>Nuovo Magari B2</td><td><font size=+2><strong>B2 – Intermedio Alto (Nivel Independiente)</strong></font><p></p>En el nivel B2 del QCER, el estudiante de idiomas:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>es capaz de comprender los puntos clave de discursos complejos sobre temas concretos y abstractos, incluyendo argumentos técnicos en su campo de especialización.</li></td></tr><tr><td valign=center><li>es capaz de interactuar con fluidez y espontaneidad, lo que facilita la conversación con hablantes nativos.</li></td></tr><tr><td valign=center><li>es capaz de producir textos claros y detallados sobre una amplia gama de temas y explicar un punto de vista sobre un tema, considerando las ventajas y desventajas de diversas opciones.</li></td></tr></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de italiano de nivel B2:</u> Consulta disponibilidad.</font><br><br></td></tr></table><br><br><hr><br><p><font size=+2> &nbsp; <u>Nivel Avanzado: C1 Adultos</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Nuovo Magari C12.jpg"><br>Nuovo Magari C1/C2</td><td><font size=+2><strong>C1 – Avanzado (Nivel Independiente)</strong></font><p></p>En el nivel C1 del QCER, el estudiante de italiano:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>es capaz de comprender oraciones más largas y complejas, y reconocer significados implícitos.</li></td></tr><tr><td valign=center><li>es capaz de expresar ideas con fluidez y espontaneidad, sin pensar demasiado en cómo expresarlas.</li></td></tr><tr><td valign=center><li>es capaz de usar el idioma de forma flexible y concreta para fines sociales, académicos y profesionales.</li></td></tr><tr><td valign=center><li>es capaz de producir textos claros, bien estructurados y detallados sobre temas complejos, demostrando el uso correcto de la organización, la articulación y la cohesión textual.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de italiano de nivel C1:</u> Próximamente.</font><br><br></td></tr></table><br><br><hr><br><p><font size=+2> &nbsp; <u>Nivel experto: C2 Adultos</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Nuovo Magari C12.jpg"><br>Nuovo Magari C1/C2</td><td><font size=+2><strong>C2 – Experto (Nivel de dominio)</strong></font><p></p>En el nivel C2 del QCER, el estudiante de italiano:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>es capaz de comprender fácilmente todo lo que escucha o lee.</li></td></tr><tr><td valign=center><li>es capaz de sintetizar información de diferentes fuentes, tanto escritas como orales, reconstruyendo el argumento de forma coherente.</li></td></tr><tr><td valign=center><li>es capaz de expresarse de forma espontánea, fluida y precisa, distinguiendo diferencias de significado incluso en las situaciones más complejas.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de italiano de nivel C2:</u> Próximamente.</font><br><br></td></tr></table><br><br><hr><br><p><font size=+2> &nbsp; <u>Nivel inicial: A1 Juniors para adolescentes de 13 a 17 años.</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="ParlaConMe 1.jpg"><br>Parla con me 1</td><td><font size=+2><strong>Háblame 1 (Nivel A1)</strong></font><p></p>El estudiante de idiomas:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>es capaz de comprender y usar expresiones básicas para satisfacer necesidades concretas e inmediatas.</li></td></tr><tr><td valign=center><li>es capaz de presentarse a otras personas, haciendo y respondiendo preguntas personales, como dónde vive, a quién conoce y qué posee.</li></td></tr><tr><td valign=center><li>es capaz de interactuar solo si la otra persona habla despacio y con claridad.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de Nivel A1 para jóvenes:</u> Próximamente.</font><br><br></td></tr></table><br><br><hr><br><p><font size=+2> &nbsp; <u>Nivel preintermedio: A2 Juniors (niños de 13 a 17 años).</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="ParlaConMe 2.jpg"><br>Parla con me 2</td><td><font size=+2><strong>Háblame 2 (Nivel A2)</strong></font><p></p>El estudiante de idiomas:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>es capaz de comprender oraciones y expresiones comunes relacionadas con áreas generales como la familia, la escuela o las compras.</li></td></tr><tr><td valign=center><li>es capaz de comunicarse en tareas sencillas y rutinarias que requieren un intercambio simple de información sobre temas como la familia o lo cotidiano.</li></td></tr><tr><td valign=center><li>es capaz de describir en términos sencillos aspectos de su vida, su entorno inmediato y sus necesidades inmediatas.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de Nivel A2 para jóvenes:</u> Próximamente.</font><br><br></td></tr></table><br><br><hr><br><p><font size=+2> &nbsp; <u>Nivel intermedio: B1 Juniors (niños de 13 a 17 años).</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="ParlaConMe 3.jpg"><br>Parla con me 3</td><td><font size=+2><strong>Háblame 3 (Nivel  B1)</strong></font><p></p>El estudiante de idiomas:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>puede comprender los puntos principales de una conversación clara sobre temas cotidianos que se encuentran habitualmente en el comedor, en el colegio o durante el tiempo libre.</li></td></tr><tr><td valign=center><li>puede desenvolverse en situaciones que probablemente surjan al viajar a zonas donde se habla el idioma.</li></td></tr><tr><td valign=center><li>puede producir una conversación sencilla y coherente sobre temas conocidos o de interés personal.</li></td></tr><tr><td valign=center><li>puede describir experiencias y acontecimientos, esperanzas y ambiciones, así como opiniones y planes a corto plazo.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de Nivel B1 para jóvenes:</u> Próximamente.</font><br><br></td></tr></table><br><br><hr><br><p><br><br>',
            casos: '<img src="CasosDeExito Negro.jpg" width="100%" alt="Casos de Exito"><br><br><center><h1>Casos Exitosos</h1></center><p>M&aacute;s de 500 alumnos.</p>',
            quienes: '<img src="QSomos.jpg" width="100%" alt="Quiénes Somos"><br><center><h1>Quiénes Somos</h1></center><p>Somos una academia dedicada a la enseñanza del idioma italiano (basado en el estándar internacional <b>QCER</b>), con el objetivo de acercar la lengua y la cultura de Italia a estudiantes de todas las edades.</p><p>Nuestro equipo está formado por docentes altamente capacitados, que combinan experiencia, pasión y métodos modernos de enseñanza, lo que les permite brindar una experiencia educativa completa, moderna y accesible.</p><p>Ofrecemos cursos para todas las edades (niños-adultos) y todos losniveles (desde principiantes hasta avanzados), así como preparación para certificaciones internacionales. Más que aprender un idioma, viví una experiencia cultural única enriquesedora y divertida.</p><br><p><center><h1>Nuestra Misión</h1></center><p>Brindar una educación de calidad en el idioma italiano, fomentando el aprendizaje dinámico, práctico y culturalmente enriquecedor, que le permita al estudiante no solo aprender a comunicarse, sino que también se conecte con la cultura, la historia y las tradiciones de Italia. A partir de esta formación lingüística de excelencia, combinando práctica, teoría y cultura, nuestros estudiantes logran sus objetivos personales, académicos o profesionales.</p><br><p><center><h2>¿Que es el QCER?</h2></center><p>El QCER es un estándar internacional que define la competencia lingüística en seis niveles (A1 a C2), utilizado para medir el dominio de idiomas de manera objetiva. Evalúa habilidades de lectura, escritura, escucha y habla, sirviendo como guía para el aprendizaje, enseñanza y evaluación, lanzado por el Consejo de Europa en 2001.</p></p><br><p><center><h2>¿Cuáles son los diferentes niveles del QCER?</h2></center>Los seis niveles del QCER son A1, A2, B1, B2, C1 y C2. Estos seis niveles de referencia son ampliamente reconocidos por los estándares europeos para evaluar la competencia individual en cuarenta idiomas diferentes. Cada nivel se divide en cuatro tipos de competencia (destrezas lingüísticas) que describen lo que un estudiante debería ser capaz de hacer en lectura, comprensión auditiva, expresión oral y expresión escrita.</p><br><center><img src="Cuadro QCER.jpg"></center><br>',

    it: {
        menu: ["Home", "Corsi", "Casi di Successo", "Chi Siamo", "Contattaci", "Area Studenti"],
        contenido: {
            inicio: '<div class="slider"><div class="slides"><div class="slide"><img src="Italia15.jpg" alt="Italia 6"></div><div class="slide"><img src="Italia10.jpg" alt="Italia 10"></div><div class="slide"><img src="Italia7.jpg" alt="Italia 7"></div><div class="slide"><img src="Italia13.jpg" alt="Italia 13"></div><div class="slide"><img src="Italia6.jpg" alt="Italia 3"></div><div class="slide"><img src="Italia5.jpg" alt="Italia 5"></div></div></div><center><br><h1>Benvenuti</h1><table border=0 width=90% cellpadding="1" cellspacing="1"><tr><td><p class="justificado">Benvenuti Scopri la lingua della letteratura, l’arte e la passione. Nella nostra <b>Accademia Italiana Online</b> ti invitiamo a immergersi nell’italiano di una forma autentica, dinamica e completamente pratica, ideale tanto per chi comincia da zero come da chi desidera migliorare il suo livello accademico.</p><p class="justificado">Imparare l’italiano non è solo imparare una lingua, è molto altro ancora assai profondo: ci apre le porte alla storia di Roma, all’incantesima città di Firenze, alla magia di Venezia e ad una delle gastronomie più riconosciute del mondo. Il nostro approccio umanistico/affettivo della glottodidattica combina Lingua e Cultura italiane sin dal primo giorno.</p><p class="justificado">All’interno del nostro <font color=blue><u>Piano di studio</u></font> si prevedono corsi specializzati, conformati da piccoli gruppi e lezioni ideate per avanzare in modo rapido ed efficace. Inoltre, la modalità online si aggiusta meglio ai bisogni o agli obiettivi dei nostri studenti.</p><p class="justificado">I corsi sono adatti a coloro che vogliono viaggiare, studiare in Italia o semplicemente godersi la lingua, questo è lo spazio per iniziare il vostro percorso. Vi condividiamo materiale autentico, in fine vi diamo la corretta preparazione all’accreditamento a seconda il livello richiesto per le <font color=blue><u>Certificazioni internazionali</u></font> (QCER).</p></td></tr></table><p><center><br><table border=2 width=50% cellpadding="1" cellspacing="1"><tr><td><center><table border=0 width=100% cellpadding="10" cellspacing="3"><tr><td width=25% valign="middle"><font color=blue><u>Livelli QCER: </u></font></td><td width=75% align="left" valign="middle"><font color=blue>Quadro comune europeo di riferimento per la conoscenza delle lingue.</font></td></tr></table></center></td></tr></table></center></p><br><table border=0 width=90% cellpadding="1" cellspacing="1"><tr><td><p class="justificado">In Europa, nella comunità dell’apprendimento della lingua, spesso ascoltiamo le persone parlare del proprio livello linguistico. Ad esempio: “parlo francese con un livello B1” o “sto frequentando un corso di lingua inglese, sono in una classe di livello A2 di grammatica e conversazione”.</p></td></tr></table><br><p><center><table border=0 width=90% cellpadding="10" cellspacing="3"><tr><td align=center valign="middle"><img src="CuadroQCER.jpg" alt="Cuadro QCER"></td><td valign="middle"><br><br><h2>Cosa significa B1 o A2?</h2><p class="justificado">Questi titoli sono i livelli di competenza linguistica nel sistema del <b>Quadro comune europeo di riferimento per la conoscenza delle lingue</b>, abbreviato in italiano <b>QCER</b>, e sono usati dagli studenti per misurare il proprio livello di conoscenza di una determinata lingua. QCER è una linea guida che viene utilizzata per descrivere i traguardi raggiunti da chi studia una lingua straniera in tutta Europa e sempre più in altri Paesi.</p><br><font color=white>.<br>.</font></td></tr></table></p><br><h2>Quali sono i vari livelli QCER?</h2><table border=0 width=90% cellpadding="1" cellspacing="1"><tr><td><p class="justificado">I sei livelli all’interno di QCER sono <b>A1</b>, <b>A2</b>, <b>B1</b>, <b>B2</b>, <b>C1</b>, e <b>C2</b>. Questi sei livelli di riferimento sono ampiamente riconosciuti dagli standard europei per valutare le competenze individuali in quaranta lingue differenti. Ogni livello è diviso in quattro tipi di competenze (abilità linguistiche) che descrivono cosa uno studente dovrebbe essere in grado di fare per quanto riguarda la <b>lettura</b>, l’<b>ascolto</b>, la <b>conversazione</b> e la <b>scrittura</b>.</td></tr></table></p><br><p><table border=1 width=95% cellpadding="10" cellspacing="3"><tr><td align=center valign="middle"><h2>Vi aspettiamo nella nostra Accademia Italiana Online per scoprire insieme un nuovo mondo, ricco di sentimenti ed emozioni che avvolgono i cuori di tutti quanti!</h2></td></tr></table><br><br></p>',
            cursos: '<img src="Corsi.jpg" width="100%" alt="Corsi"><center><br><br><br><h1>Corsi: regolari e intensivi</h1></center><br><p><font size=+2> &nbsp; <u>Livello Iniziale: A1</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Domani 1.jpg"><br>Domani 1</td><td><font size=+2><strong>A1 – Principiante (Livello Scoperta)</strong></font><p></p>Al livello A1 QCER, lo studente di lingua:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>è in grado di comprendere e usare le espressioni base e necessarie per soddisfare bisogni concreti ed immediati.</li></td></tr><tr><td valign=center><li>è in grado di presentarsi ad altre persone, chiedere e rispondere a domande di tipo personale, come ad esempio il luogo in cui vive, le persone che conosce e le cose che possiede.</li></td></tr><tr><td valign=center><li>è in grado di interagire solo se l’interlocutore parla lentamente e chiaramente.</li></td></tr></table></center><p></p>» <font color=blue><u>Prova il livello A1 di Italiano:</u> Chiedere disponibilità.</font><br><br></td></tr></table><br><br><hr><br><p><font size=+2> &nbsp; <u>Livello Pre-intermedio: A2</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Domani 2.jpg"><br>Domani 2</td><td><font size=+2><strong>A2 – Elementare (Livello di sopravvivenza)</strong></font><p></p>Al livello A2 QCER, lo studente di lingua:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>è in grado di capire frasi ed espressioni di uso comune, relativamente a macro-aree come famiglia, lavoro o shopping.</li></td></tr><tr><td valign=center><li>è in grado di comunicare in attività semplici e abitudinarie e che richiedono un semplice scambio di informazioni su argomenti come la famiglia o di uso comune.</li></td></tr><tr><td valign=center><li>è in grado di descrivere in termini semplici aspetti della sua vita, dell’ambiente circostante e di esprimere bisogni immediati.</li></td></tr></table></center><p></p>» <font color=blue><u>Prova il livello A2 di Italiano:</u> Chiedere disponibilità.</font><br><br></td></tr></table><br><br><hr><br><p><font size=+2> &nbsp; <u>Livello Intermedio: B1</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Domani 3.jpg"><br>Domani 3</td><td><font size=+2><strong>B1 – Indipendente (Livello soglia)</strong></font><p></p>Al livello B1 QCER, lo studente di lingua:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>è in grado di comprendere i punti essenziali di un discorso chiaro, su argomenti familiari che si incontrano regolarmente a lavoro, scuola o nel tempo libero.</li></td></tr><tr><td valign=center><li>è in grado di affrontare situazioni che possono verificarsi durante un viaggio, in zone in cui si parla la lingua in questione.</li></td></tr><tr><td valign=center><li>è in grado di produrre un discorso semplice e coerente su argomenti familiari o di personale interesse.</li></td></tr><tr><td valign=center><li>è in grado di descrivere esperienze ed eventi, speranze e ambizioni, così come opinioni o piani a breve termine.</li></td></tr></table></center><p></p>» <font color=blue><u>Prova il Corso di Livello B1 di Italiano:</u> Chiedere disponibilità.</font><br><br></td></tr></table><br><br><hr><br><br><!center><font size=+2> &nbsp; <u>Corso di Consolidamento e Conversazione: Livello B1 Adulti</u></font><br><br><table border=0><tr><td> &nbsp; &nbsp; Dopo il livello B1, lo studente di lingua:<br><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>può consolidare la propria conoscenza della grammatica.</li></td></tr><tr><td valign=center><li>può migliorare l’aspetto comunicativo.</li></td></tr><tr><td valign=center><li>è in grado di produrre discorsi di vario tipo, compresa l’esfera professionale.</li></td></tr><tr><td valign=center><li>è in grado di percepire le differenze di un contesto concreto oppure astratto.</li></td></tr><tr><td valign=center><li>Prova il Corso di Consolidamento e Conversazione di Livello B1: Chiedere disponibilità.</li></td></tr></table></center><p></p>» <font color=blue><u>Prova il Corso di Consolidamento e Conversazione di Livello B1:</u> Chiedere disponibilità.</font></td></tr></table><!/center><br><br><hr><br><p><font size=+2> &nbsp; <u>Corso di Preparazione alla Certificazione: Livello B1 Adulti</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Nuovo Esame B1.jpg"><br>Quaderno PLIDA B1</td><td>Dopo il Corso di Livello B1, lo studente di lingua:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>può accreditare la propria conoscenza del Livello Intermedio B1 attraverso la certificazione PLIDA, nella sede dell’Associazione di Dante Alighieri.</li></td></tr><tr><td valign=center>I Centri certificatori PLIDA si trovano in tutto il mondo, visita il sito <a href="http://www.plida.it" target="_blank">www.plida.it</a></td></tr></table></center><p></p>» <font color=blue><u>Prova il Corso di Preparazione alla Certificazione del Livello B1:</u> Chiedere disponibilità.</font><br><br></td></tr></table><br><br><hr><br><br><center><table border=1 cellspacing="1"><tr><td><table border=0 cellspacing="1"><tr><td> &nbsp; &nbsp; &nbsp; &nbsp; </td><td><table border=0 cellspacing="1"><tr><td valign=center><h1><i>Con il Certificato PLIDA si può:</i></h1></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Richiedere il permesso di soggiorno in Italia (dal livello A2);</li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Richiedere il permesso di lungo soggiorno in Italia (carta di soggiorno CE - dal livello A2);</li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Iscriversi all’Università italiana (il livello richiesto varia in base ai singoli atenei e al tipo di facoltà);  &nbsp; </li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Richiedere il visto di ingresso per ragioni di studio;</li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Postularsi nelle aziende italiane per lavorare in rapporto di dipendenza;</li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Inoltre, richiedere la cittadinanza italiana (dal livello B1).</li><br></td></tr></table></td></tr></table></td></tr></table></center><br><br><hr><br><p><font size=+2> &nbsp; <u>Livello Intermedio/alto: B2 Adulti</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Nuovo Magari B2.jpg"><br>Nuovo Magari B2</td><td><font size=+2><strong>B2 – Intermedio/alto (Livello Indipendente)</strong></font><p></p>Al livello B2 QCER, lo studente di lingua:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>è in grado di comprendere i punti chiave di un discorso complesso, riguardo sia temi concreti sia astratti, includendo argomentazioni tecniche nel proprio campo di specializzazione.</li></td></tr><tr><td valign=center><li>è in grado di interagire con un certo grado di fluidità e spontaneità che rende la conversazione, con i parlanti madrelingua, scorrevole e senza troppe complicazioni.</li></td></tr><tr><td valign=center><li>è in grado di produrre testi chiari e dettagliati con una vasta gamma di soggetti e spiegare il punto di vista in una tematica, considerando vantaggi e svantaggi delle varie opzioni.</li></td></tr></td></tr></table></center><p></p>» <font color=blue><u>Prova il Corso di Livello B2 di Italiano:</u> Chiedere disponibilità.</font><br><br></td></tr></table><br><br><hr><br><p><font size=+2> &nbsp; <u>Livello Avanzato: C1 Adulti</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Nuovo Magari C12.jpg"><br>Nuovo Magari C1</td><td><font size=+2><strong>C1 – Avanzato (Livello Autonomo)</strong></font><p></p>Al livello C1 QCER, lo studente di lingua:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>è in grando di comprendere frasi più lunghe e complesse e di riconoscere significati impliciti.</li></td></tr><tr><td valign=center><li>è in grado di esprimere fluentemente e spontanemente le proprie idee, senza pensare molto alla maniera in cui esprimerle.</li></td></tr><tr><td valign=center><li>è in grado di usare la lingua in maniera flessibile e concreta per propositi sociali, accademici e professionali.</li></td></tr><tr><td valign=center><li>è in grado di produrre testi chiari, ben strutturati e dettagliati su argomenti complessi, mostrando il corretto uso dei meccanismi di organizzazione, articolazione e coesione del  testo.</li></td></tr></td></tr></table></center><p></p>» <font color=blue><u>Prova il Corso di Livello C1 di Italiano:</u> Prossimamente.</font><br><br></td></tr></table><br><br><hr><br><p><font size=+2> &nbsp; <u>Livello Esperto: C2 Adulti</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Nuovo Magari C12.jpg"><br>Nuovo Magari C2</td><td><font size=+2><strong>C2 – Esperto (Livello Padronanza)</strong></font><p></p>Al livello C2 QCER, lo studente di lingua:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>è in grado di comprendere facilmente tutto ciò che ascolta o legge.</li></td></tr><tr><td valign=center><li>è in grado di sintetizzare informazioni provenienti da diverse fonti, sia scritte che parlate, ricostruendo l’argomentazione in maniera coerente.</li></td></tr><tr><td valign=center><li>è in grado di esprimersi spontaneamente, fluentemente e in maniera precisa, notando la differenza di significato anche nelle situazioni più complesse.</li></td></tr></td></tr></table></center><p></p>» <font color=blue><u>Prova il Corso di Livello C2 di Italiano:</u> Prossimamente.</font><br><br></td></tr></table><br><br><hr><br><p><font size=+2> &nbsp; <u>Livello Iniziale: A1 Juniors destinato ai ragazzi dai 13 ai 17 anni.</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="ParlaConMe 1.jpg"><br>Parla con me 1.jpg</td><td><font size=+2><strong>Parla con me 1 (Livello A1)</strong></font><p></p>Lo studente di lingua:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>è in grado di comprendere e usare le espressioni base e necessarie per soddisfare bisogni concreti ed immediati.</li></td></tr><tr><td valign=center><li>è in grado di presentarsi ad altre persone, chiedere e rispondere a domande di tipo personale, come ad esempio il luogo in cui vive, le persone che conosce e le cose che possiede.</li></td></tr><tr><td valign=center><li>è in grado di interagire solo se l’interlocutore parla lentamente e chiaramente.</li></td></tr></td></tr></table></center><p></p>» <font color=blue><u>Prova il Corso di Livello A1 Juniors:</u> Prossimamente.</font><br><br></td></tr></table><br><br><hr><br><p><font size=+2> &nbsp; <u>Livello Pre-intermedio: A2 Juniors (ragazzi dai 13 ai 17 anni).</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="ParlaConMe 2.jpg"><br>Parla con me 2</td><td><font size=+2><strong>Parla con me 2 (Livello A2)</strong></font><p></p>Lo studente di lingua:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>è in grado di capire frasi ed espressioni di uso comune, relativamente a macro-aree come famiglia, scuola o shopping.</li></td></tr><tr><td valign=center><li>è in grado di comunicare in attività semplici e abitudinarie e che richiedono un semplice scambio di informazioni su argomenti come la famiglia o di uso comune.</li></td></tr><tr><td valign=center><li>è in grado di descrivere in termini semplici aspetti della sua vita, dell’ambiente circostante e di esprimere bisogni immediati.</li></td></tr></td></tr></table></center><p></p>» <font color=blue><u>Prova il Corso di Livello A2 Juniors:</u> Prossimamente.</font><br><br></td></tr></table><br><br><hr><br><p><font size=+2> &nbsp; <u>Livello Intermedio: B1 Juniors (ragazzi dai 13 ai 17 anni).</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="ParlaConMe 3.jpg"><br>Parla con me 3</td><td><font size=+2><strong>Parla con me 3 (Livello B1)</strong></font><p></p>Lo studente di lingua:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>è in grado di comprendere i punti essenziali di un discorso chiaro, su argomenti familiari che si incontrano regolarmente a mensa, a scuola o nel tempo libero.</li></td></tr><tr><td valign=center><li>è in grado di affrontare situazioni che possono verificarsi durante un viaggio, in zone in cui si parla la lingua in questione.</li></td></tr><tr><td valign=center><li>è in grado di produrre un discorso semplice e coerente su argomenti familiari o di personale interesse.</li></td></tr><tr><td valign=center><li>è in grado di descrivere esperienze ed eventi, speranze e ambizioni, così come opinioni o piani a breve termine.</li></td></tr></td></tr></table></center><p></p>» <font color=blue><u>Prova il Corso di Livello B1 Juniors:</u> Prossimamente.</font><br><br></td></tr></table><br><br><hr><br><br>',

const secciones = ["inicio","cursos","casos","quienes", "contacto", "area"];

/* ===== STATE ===== */
let idioma = localStorage.getItem("idioma") || "es";
let usuario = localStorage.getItem("usuario");

/* ===== FUNCTIONS ===== */
function renderMenu() {
    const ul = document.getElementById("menu");
    ul.innerHTML = "";
    textos[idioma].menu.forEach((txt,i)=>{
        if (secciones[i] === "area" && !usuario) return;
        ul.innerHTML += `<li onclick="cargar('${secciones[i]}')">${txt}</li>`;
    });
}

function cargar(sec) {
    if (sec === "area" && !usuario) {
        abrirLogin();
        return;
    }
    document.getElementById("contenido").innerHTML = textos[idioma].contenido[sec];
}

function cambiarIdioma(l) {
    idioma = l;
    localStorage.setItem("idioma", idioma);
    renderMenu();
    cargar("inicio");
}

function abrirLogin() {
    document.getElementById("loginModal").classList.add("show");
}

function cerrarLogin(e) {
    if (!e || e.target.id === "loginModal") {
        document.getElementById("loginModal").classList.remove("show");
    }
}

function login() {
    const u = user.value;
    const p = pass.value;

    if (u === "alumno" && p === "1234") {
        localStorage.setItem("usuario", u);
        usuario = u;
        cerrarLogin();
        init();
        cargar("area");
    } else {
        error.innerText = "Credenciales incorrectas";
    }
}

function logout() {
    localStorage.removeItem("usuario");
    usuario = null;
    init();
    cargar("inicio");
}

function init() {
    document.getElementById("langSelect").value = idioma;
    document.getElementById("authBtn").innerHTML = usuario
        ? `<div class="logout-btn" onclick="logout()">${textos[idioma].logout}</div>`
        : `<div class="login-btn" onclick="abrirLogin()">${textos[idioma].login}</div>`;
    renderMenu();
}

/* ===== INIT ===== */
init();
cargar("inicio");
</script>
