la glotodid&aacute;ctica combina Lengua y Cultura italiana desde el primer d&iacute;a.</p><p class="justificado">Contamos con cursos especializados, grupos reducidos y clases dise&ntilde;adas para que avances de manera r&aacute;pida y efectiva. Adem&aacute;s, ofrecemos la modalidad online para poder adaptarnos mejor a tus tiempos y objetivos.</p><p class="justificado">Ya sea que quieras viajar, estudiar en Italia o simplemente disfrutar del idioma, este es el lugar para comenzar tu camino. Te compartimos material exclusivo y te brindamos la correcta preparaci&oacute;n por nivel para las <font color=blue><u>Certificaciones internacionales</u></font> (QCER).</p></td></tr></table><p><center><br><table border=2 width=50% cellpadding="1" cellspacing="1"><tr><td><center><table border=0 width=100% cellpadding="10" cellspacing="0"><tr><td width="120" valign="middle"><font color=blue><u>Niveles QCER:</u></font></td><td align="left" valign="middle"><font color=blue>Cuadro com&uacute;n europeo de referencia para el conocimiento de los idiomas.</font></td></tr></table></center></td></tr></table></center></p><br><table border=0 width=90% cellpadding="1" cellspacing="1"><tr><td><p class="justificado">En Europa, en la comunidad del aprendizaje de las lenguas, a menudo escuchamos las personas hablar del propio nivel ling&uuml;&iacute;stico. Por ejemplo: &iquest;hablo franc&eacute;s con un nivel B1&quest; o &iquest;estoy frecuentando un curso de ingl&eacute;s, estoy en una clase di nivel A2 de gram&aacute;tica y conversaci&oacute;n&quest;.</p></td></tr></table><br><!p><table border=0 width=93% cellpadding="1" cellspacing="1"><tr><td align=center><div class="container"><img src="CuadroQCER.jpg" alt="Cuadro QCER" width=60vw><strong class="tituloQCER">&iquest;Qu&eacute; significa B1 o A2&quest;</strong><p class="cuadroQCER">Estos t&iacute;tulos son los niveles de competencia ling&uuml;&iacute;stica en el sistema del <b>Cuadro com&uacute;n europeo de referencia para el conocimiento de las lenguas</b>, abreviado en italiano <b>QCER</b>, y son usados por los estudiantes para medir el propio nivel de conocimiento de una determinada lengua. QCER es una l&iacute;nea-gu&iacute;a que viene usada para describir los objetivos alcanzados por quien estudia una lengua extranjera en toda Europa y siempre m&aacute;s en otros pa&iacute;ses.</div></td><td>&nbsp;&nbsp;&nbsp;&nbsp;</td></tr></table><br><h2>&iquest;Cu&aacute;les son los varios niveles QCER&quest;</h2><table border=0 width=90% cellpadding="1" cellspacing="1"><tr><td><p class="justificado">Los seis niveles al interno del QCER son <b>A1</b>, <b>A2</b>, <b>B1</b>, <b>B2</b>, <b>C1</b>, y <b>C2</b>. Estos seis niveles de referencia est&aacute;n ampliamente reconocidos por los est&aacute;ndares europeos para evaluar las competencias individuales en cuarenta lenguas diferentes. Cada nivel est&aacute; dividido en cuatro tipos de competencias (habilidades ling&uuml;&iacute;sticas) que describen lo que deber&iacute;a ser capaz un estudiante por lo que respecta la <b>lectura</b>, la <b>escucha</b>, la <b>conversaci&oacute;n</b> y la <b>escritura</b>.</td></tr></table></p><br><p><table border=1 width=95% cellpadding="10" cellspacing="3"><tr><td align=center valign="middle"><h2>Los esperamos en nuestra <b>Academia Italiana Online</b> para descubrir junt@s un nuevo mundo, rico de sentimientos y emociones que llenan los corazones de tod@s!</h2></td></tr></table><br><br></p>',

><td valign=center><li>Puede describir en t&eacute;rminos sencillos aspectos de su entorno, su entorno inmediato y sus necesidades inmediatas.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de italiano de nivel A2:</u><font size=+2> Preguntar por disponibilidad.</font><br><br></td></tr></table><br><br><hr><br><p>&nbsp; <u class="titulo">Nivel Intermedio: B1</u></font><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Domani 3.jpg"><br>Domani 3</td><td><strong class="titulo">B1 - Independiente (Nivel Umbral)</strong><p></p>En el nivel B1 del QCER, el estudiante de italiano:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>Puede comprender los puntos principales de textos claros sobre temas familiares que se encuentran habitualmente en el trabajo, la escuela o el ocio.</li></td></tr><tr><td valign=center><li>Puede desenvolverse en situaciones que probablemente surjan al viajar a zonas donde se habla el idioma.</li></td></tr><tr><td valign=center><li>Puede producir discursos sencillos y coherentes sobre temas familiares o de inter&eacute;s personal.</li></td></tr><tr><td valign=center><li>Puede describir experiencias y acontecimientos, esperanzas y ambiciones, as&iacute; como opiniones o planes a corto plazo.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de italiano de nivel B1:</u> Consulta disponibilidad.</font><br><br></td></tr></table><br><br><hr><br><br><!center>&nbsp; <u class="titulo">Curso de Consolidaci&oacute;n y Conversaci&oacute;n: Nivel B1 para Adultos</u><br><br><table border=0><tr><td> &nbsp; &nbsp; Tras alcanzar el nivel B1, el estudiante de idiomas:<br><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>puede consolidar sus conocimientos gramaticales.</li></td></tr><tr><td valign=center><li>puede mejorar sus habilidades comunicativas.</li></td></tr><tr><td valign=center><li>es capaz de producir diversos tipos de discurso, incluyendo expresiones profesionales.</li></td></tr><tr><td valign=center><li>es capaz de percibir diferencias en contextos concretos o abstractos.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el Curso de Consolidaci&oacute;n y Conversaci&oacute;n de Nivel B1:</u> Consulta disponibilidad.</font></td></tr></table><!/center><br><br><hr><br><br><!h1>&nbsp; <u class="titulo">Curso de preparaci&oacute;n para la certificaci&oacute;n: Nivel B1 Adultos</u><!/h1><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Nuovo Esame B1.jpg"><br>Quaderno PLIDA B1</td><td><p></p>Tras alcanzar el nivel B1, el estudiante de idiomas:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>pueden validar sus conocimientos del nivel intermedio B1 mediante la certificaci&oacute;n PLIDA, en la sede de la Asociaci&oacute;n Dante Alighieri.</li></td></tr><tr><td valign=center><br>Los centros de certificaci&oacute;n PLIDA se encuentran en todo el mundo; visite <a href="http://www.plida.it" target="_blank">www.plida.it</a></td></tr></table></center><p></p>» <font color=blue><u>Pruebe el curso de preparaci&oacute;n para la certificaci&oacute;n de nivel B1:</u> Consulte la disponibilidad.</font><br><br></td></tr></table><br><br><hr><br><br><center><table border=1 cellspacing="1"><tr><td><table border=0 cellspacing="1"><tr><td> &nbsp; &nbsp; &nbsp; &nbsp; </td><td><table border=0 cellspacing="1"><tr><td valign=center><h1><i>La Certificaci&oacute;n PLIDA permite a los estudiantes:</i></h1></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Solicitar "Permesso di soggiorno in Italia" (desde el nivel A2);</li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Solicitar "Permesso di lungo soggiorno in Italia", sea un permiso de estad&iacute;a con el prop&oacute;sito de establecerse en el pa&iacute;s (desde el nivel A2); &nbsp; &nbsp; </li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Inscribirse en las Universidades para realizar carreras universitarias (el nivel solicitado varia en base a los ateneos y al tipo de facultad);  &nbsp; </li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Solicitar visto de ingreso por razones de estudio;</li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Postularse en empresas para trabajar en relaci&oacute;n de dependencia.;</li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Adem&aacute;s, se podr&aacute; solicitar Ciudadan&iacute;a italiana. </li><br></td></tr></table></td></tr></table></td></tr></table></center><br><br><hr><br><p>&nbsp; <u class="titulo">Nivel Intermedio Alto: B2 Adultos</u><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Nuovo Magari B2.jpg"><br>Nuovo Magari B2</td><td><strong class="titulo">B2 - Intermedio Alto (Nivel Independiente)</strong><p></p>En el nivel B2 del QCER, el estudiante de idiomas:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>es capaz de comprender los puntos clave de discursos complejos sobre temas concretos y abstractos, incluyendo argumentos t&eacute;cnicos en su campo de especializaci&oacute;n.</li></td></tr><tr><td valign=center><li>es capaz de interactuar con fluidez y espontaneidad, lo que facilita la conversaci&oacute;n con hablantes nativos.</li></td></tr><tr><td valign=center><li>es capaz de producir textos claros y detallados sobre una amplia gama de temas y explicar un punto de vista sobre un tema, considerando las ventajas y desventajas de diversas opciones.</li></td></tr></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de italiano de nivel B2:</u> Consulta disponibilidad.</font><br><br></td></tr></table><br><br><hr><br><p>&nbsp; <u class="titulo">Nivel Avanzado: C1 Adultos</u><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Nuovo Magari C12.jpg"><br>Nuovo Magari C1/C2</td><td><strong class="titulo">C1 - Avanzado (Nivel Independiente)</strong><p></p>En el nivel C1 del QCER, el estudiante de italiano:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>es capaz de comprender oraciones m&aacute;s largas y complejas, y reconocer significados impl&iacute;citos.</li></td></tr><tr><td valign=center><li>es capaz de expresar ideas con fluidez y espontaneidad, sin pensar demasiado en c&oacute;mo expresarlas.</li></td></tr><tr><td valign=center><li>es capaz de usar el idioma de forma flexible y concreta para fines sociales, acad&eacute;micos y profesionales.</li></td></tr><tr><td valign=center><li>es capaz de producir textos claros, bien estructurados y detallados sobre temas complejos, demostrando el uso correcto de la organizaci&oacute;n, la articulaci&oacute;n y la cohesi&oacute;n textual.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de italiano de nivel C1:</u> Pr&oacute;ximamente.</font><br><br></td></tr></table><br><br><hr><br><p>&nbsp; <u class="titulo">Nivel experto: C2 Adultos</u><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Nuovo Magari C12.jpg"><br>Nuovo Magari C1/C2</td><td><strong class="titulo">C2 - Experto (Nivel de dominio)</strong><p></p>En el nivel C2 del QCER, el estudiante de italiano:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>es capaz de comprender f&aacute;cilmente todo lo que escucha o lee.</li></td></tr><tr><td valign=center><li>es capaz de sintetizar informaci&oacute;n de diferentes fuentes, tanto escritas como orales, reconstruyendo el argumento de forma coherente.</li></td></tr><tr><td valign=center><li>es capaz de expresarse de forma espont&aacute;nea, fluida y precisa, distinguiendo diferencias de significado incluso en las situaciones m&aacute;s complejas.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de italiano de nivel C2:</u> Pr&oacute;ximamente.</font><br><br></td></tr></table><br><br><hr><br><p>&nbsp; <u class="titulo">Nivel inicial: A1 Juniors para adolescentes de 13 a 17 a&ntilde;os.</u><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="ParlaConMe 1.jpg"><br>Parla con me 1</td><td><strong class="titulo">H&aacute;blame 1 (Nivel A1)</strong><p></p>El estudiante de idiomas:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>es capaz de comprender y usar expresiones b&aacute;sicas para satisfacer necesidades concretas e inmediatas.</li></td></tr><tr><td valign=center><li>es capaz de presentarse a otras personas, haciendo y respondiendo preguntas personales, como d&oacute;nde vive, a qui&eacute;n conoce y qu&eacute; posee.</li></td></tr><tr><td valign=center><li>es capaz de interactuar solo si la otra persona habla despacio y con claridad.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de Nivel A1 para j&oacute;venes:</u> Pr&oacute;ximamente.</font><br><br></td></tr></table><br><br><hr><br><p>&nbsp; <u class="titulo">Nivel preintermedio: A2 Juniors (ni&ntilde;os de 13 a 17 a&ntilde;os).</u><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="ParlaConMe 2.jpg"><br>Parla con me 2</td><td><strong class="titulo">H&aacute;blame 2 (Nivel A2)</strong><p></p>El estudiante de idiomas:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>es capaz de comprender oraciones y expresiones comunes relacionadas con &aacute;reas generales como la familia, la escuela o las compras.</li></td></tr><tr><td valign=center><li>es capaz de comunicarse en tareas sencillas y rutinarias que requieren un intercambio simple de informaci&oacute;n sobre temas como la familia o lo cotidiano.</li></td></tr><tr><td valign=center><li>es capaz de describir en t&eacute;rminos sencillos aspectos de su vida, su entorno inmediato y sus necesidades inmediatas.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de Nivel A2 para j&oacute;venes:</u> Pr&oacute;ximamente.</font><br><br></td></tr></table><br><br><hr><br><p>&nbsp; <u class="titulo">Nivel intermedio: B1 Juniors (ni&ntilde;os de 13 a 17 a&ntilde;os).</u><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="ParlaConMe 3.jpg"><br>Parla con me 3</td><td><strong class="titulo">H&aacute;blame 3 (Nivel  B1)</strong><p></p>El estudiante de idiomas:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>puede comprender los puntos principales de una conversaci&oacute;n clara sobre temas cotidianos que se encuentran habitualmente en el comedor, en el colegio o durante el tiempo libre.</li></td></tr><tr><td valign=center><li>puede desenvolverse en situaciones que probablemente surjan al viajar a zonas donde se habla el idioma.</li></td></tr><tr><td valign=center><li>puede producir una conversaci&oacute;n sencilla y coherente sobre temas conocidos o de inter&eacute;s personal.</li></td></tr><tr><td valign=center><li>puede describir experiencias y acontecimientos, esperanzas y ambiciones, as&iacute; como opiniones y planes a corto plazo.</li></td></tr></table></center><p></p>» <font color=blue><u>Prueba el curso de Nivel B1 para j&oacute;venes:</u> Pr&oacute;ximamente.</font><br><br></td></tr></table><br><br><hr><br><p><br><br>',

            quienes: '<img src="QSomos.jpg" width="100%" alt="Qui&eacute;nes Somos"><br><center><h1>Qui&eacute;nes Somos</h1></center><p>Somos una academia dedicada a la ense&ntilde;anza del idioma italiano (basado en el est&aacute;ndar internacional <b>QCER</b>), con el objetivo de acercar la lengua y la cultura de Italia a estudiantes de todas las edades.</p><p>Nuestro equipo est&aacute; formado por docentes altamente capacitados, que combinan experiencia, pasi&oacute;n y m&eacute;todos modernos de ense&ntilde;anza, lo que les permite brindar una experiencia educativa completa, moderna y accesible.</p><p>Ofrecemos cursos para todas las edades (ni&ntilde;os-adultos) y todos losniveles (desde principiantes hasta avanzados), as&iacute; como preparaci&oacute;n para certificaciones internacionales. M&aacute;s que aprender un idioma, viv&iacute; una experiencia cultural &uacute;nica enriquesedora y divertida.</p><br><p><center><h1>Nuestra Misi&oacute;n</h1></center><p>Brindar una educaci&oacute;n de calidad en el idioma italiano, fomentando el aprendizaje din&aacute;mico, pr&aacute;ctico y culturalmente enriquecedor, que le permita al estudiante no solo aprender a comunicarse, sino que tambi&eacute;n se conecte con la cultura, la historia y las tradiciones de Italia. A partir de esta formaci&oacute;n ling&uuml;&iacute;stica de excelencia, combinando pr&aacute;ctica, teor&iacute;a y cultura, nuestros estudiantes logran sus objetivos personales, acad&eacute;micos o profesionales.</p><br><p><center><h2>&iquest;Que es el QCER&quest;</h2></center><p>El QCER es un est&aacute;ndar internacional que define la competencia ling&uuml;&iacute;stica en seis niveles (A1 a C2), utilizado para medir el dominio de idiomas de manera objetiva. Eval&uacute;a habilidades de lectura, escritura, escucha y habla, sirviendo como gu&iacute;a para el aprendizaje, ense&ntilde;anza y evaluaci&oacute;n, lanzado por el Consejo de Europa en 2001.</p></p><br><p><center><h2>&iquest;Cu&aacute;les son los diferentes niveles del QCER&quest;</h2></center>Los seis niveles del QCER son A1, A2, B1, B2, C1 y C2. Estos seis niveles de referencia son ampliamente reconocidos por los est&aacute;ndares europeos para evaluar la competencia individual en cuarenta idiomas diferentes. Cada nivel se divide en cuatro tipos de competencia (destrezas ling&uuml;&iacute;sticas) que describen lo que un estudiante deber&iacute;a ser capaz de hacer en lectura, comprensi&oacute;n auditiva, expresi&oacute;n oral y expresi&oacute;n escrita.</p><br><center><img src="Cuadro QCER.jpg"></center><br>',

            inicio: '<div class="slider"><div class="slides"><div class="slide"><img src="Italia15.jpg" alt="Italia 6"></div><div class="slide"><img src="Italia10.jpg" alt="Italia 10"></div><div class="slide"><img src="Italia7.jpg" alt="Italia 7"></div><div class="slide"><img src="Italia13.jpg" alt="Italia 13"></div><div class="slide"><img src="Italia6.jpg" alt="Italia 3"></div><div class="slide"><img src="Italia5.jpg" alt="Italia 5"></div></div></div><center><h1>Benvenuti</h1><table border=0 width=90% cellpadding="1" cellspacing="1"><tr><td><p class="justificado">Benvenuti Scopri la lingua della letteratura, larte e la passione. Nella nostra <b>Accademia Italiana Online</b> ti invitiamo a immergersi nellitaliano di una forma autentica, dinamica e completamente pratica, ideale tanto per chi comincia da zero come da chi desidera migliorare il suo livello accademico.</p><p class="justificado">Imparare litaliano non 耀 solo imparare una lingua, 耀 molto altro ancora assai profondo: ci apre le porte alla storia di Roma, allincantesima citt di Firenze, alla magia di Venezia e ad una delle gastronomie più riconosciute del mondo. Il nostro approccio umanistico/affettivo della glottodidattica combina Lingua e Cultura italiane sin dal primo giorno.</p><p class="justificado">Allinterno del nostro <font color=blue><u>Piano di studio</u></font> si prevedono corsi specializzati, conformati da piccoli gruppi e lezioni ideate per avanzare in modo rapido ed efficace. Inoltre, la modalit online si aggiusta meglio ai bisogni o agli obiettivi dei nostri studenti.</p><p class="justificado">I corsi sono adatti a coloro che vogliono viaggiare, studiare in Italia o semplicemente godersi la lingua, questo 耀 lo spazio per iniziare il vostro percorso. Vi condividiamo materiale autentico, in fine vi diamo la corretta preparazione allaccreditamento a seconda il livello richiesto per le <font color=blue><u>Certificazioni internazionali</u></font> (QCER).</p></td></tr></table><p><center><br><table border=2 width=50% cellpadding="1" cellspacing="1"><tr><td><center><table border=0 width=100% cellpadding="10" cellspacing="3"><tr><td width=25% valign="middle"><font color=blue><u>Livelli QCER: </u></font></td><td width=75% align="left" valign="middle"><font color=blue>Quadro comune europeo di riferimento per la conoscenza delle lingue.</font></td></tr></table></center></td></tr></table></center></p><br><table border=0 width=90% cellpadding="1" cellspacing="1"><tr><td><p class="justificado">In Europa, nella comunit dellapprendimento della lingua, spesso ascoltiamo le persone parlare del proprio livello linguistico. Ad esempio: parlo francese con un livello B1 o sto frequentando un corso di lingua inglese, sono in una classe di livello A2 di grammatica e conversazione.</p></td></tr></table><br><p><center><table border=0 width=90% cellpadding="10" cellspacing="3"><tr><td align=center valign="middle"><img src="CuadroQCER.jpg" alt="Cuadro QCER"></td><td valign="middle"><br><br><h2>Cosa significa B1 o A2&quest;</h2><p class="justificado">Questi titoli sono i livelli di competenza linguistica nel sistema del <b>Quadro comune europeo di riferimento per la conoscenza delle lingue</b>, abbreviato in italiano <b>QCER</b>, e sono usati dagli studenti per misurare il proprio livello di conoscenza di una determinata lingua. QCER 耀 una linea guida che viene utilizzata per descrivere i traguardi raggiunti da chi studia una lingua straniera in tutta Europa e sempre più in altri Paesi.</p><br><font color=white>.<br>.</font></td></tr></table></p><br><h2>Quali sono i vari livelli QCER&quest;</h2><table border=0 width=90% cellpadding="1" cellspacing="1"><tr><td><p class="justificado">I sei livelli allinterno di QCER sono <b>A1</b>, <b>A2</b>, <b>B1</b>, <b>B2</b>, <b>C1</b>, e <b>C2</b>. Questi sei livelli di riferimento sono ampiamente riconosciuti dagli standard europei per valutare le competenze individuali in quaranta lingue differenti. Ogni livello 耀 diviso in quattro tipi di competenze (abilitlinguistiche) che descrivono cosa uno studente dovrebbe essere in grado di fare per quanto riguarda la <b>lettura</b>, l<b>ascolto</b>, la <b>conversazione</b> e la <b>scrittura</b>.</td></tr></table></p><br><p><table border=1 width=95% cellpadding="10" cellspacing="3"><tr><td align=center valign="middle"><h2>Vi aspettiamo nella nostra Accademia Italiana Online per scoprire insieme un nuovo mondo, ricco di sentimenti ed emozioni che avvolgono i cuori di tutti quanti!</h2></td></tr></table><br><br></p>',

e bisogni immediati.</li></td></tr></table></center><p></p>» <font color=blue><u>Prova il livello A2 di Italiano:</u> Chiedere disponibilit.</font><br><br></td></tr></table><br><br><hr><br><p>&nbsp; <u class="boldo">Livello Intermedio: B1</u><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Domani 3.jpg"><br>Domani 3</td><td><font size=+2><strong>B1  Indipendente (Livello soglia)</strong></font><p></p>Al livello B1 QCER, lo studente di lingua:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>耀 in grado di comprendere i punti essenziali di un discorso chiaro, su argomenti familiari che si incontrano regolarmente a lavoro, scuola o nel tempo libero.</li></td></tr><tr><td valign=center><li>耀 in grado di affrontare situazioni che possono verificarsi durante un viaggio, in zone in cui si parla la lingua in questione.</li></td></tr><tr><td valign=center><li>耀 in grado di produrre un discorso semplice e coerente su argomenti familiari o di personale interesse.</li></td></tr><tr><td valign=center><li>耀 in grado di descrivere esperienze ed eventi, speranze e ambizioni, cos쀀 come opinioni o piani a breve termine.</li></td></tr></table></center><p></p>» <font color=blue><u>Prova il Corso di Livello B1 di Italiano:</u> Chiedere disponibilit.</font><br><br></td></tr></table><br><br><hr><br><br><!center>&nbsp; <u class="boldo">Corso di Consolidamento e Conversazione: Livello B1 Adulti</u><br><br><table border=0><tr><td> &nbsp; &nbsp; Dopo il livello B1, lo studente di lingua:<br><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>pu  consolidare la propria conoscenza della grammatica.</li></td></tr><tr><td valign=center><li>pu  migliorare laspetto comunicativo.</li></td></tr><tr><td valign=center><li>耀 in grado di produrre discorsi di vario tipo, compresa lesfera professionale.</li></td></tr><tr><td valign=center><li>耀 in grado di percepire le differenze di un contesto concreto oppure astratto.</li></td></tr><tr><td valign=center><li>Prova il Corso di Consolidamento e Conversazione di Livello B1: Chiedere disponibilit.</li></td></tr></table></center><p></p>» <font color=blue><u>Prova il Corso di Consolidamento e Conversazione di Livello B1:</u> Chiedere disponibilit.</font></td></tr></table><!/center><br><br><hr><br><p>&nbsp; <u class="boldo">Corso di Preparazione alla Certificazione: Livello B1 Adulti</u><table border=0 width=98% cellpadding="10" cellspacing="3"><tr><td align=center><img src="Nuovo Esame B1.jpg"><br>Quaderno PLIDA B1</td><td>Dopo il Corso di Livello B1, lo studente di lingua:<p></p><center><table border=0 width=93% cellspacing="7"><tr><td valign=center><li>pu  accreditare la propria conoscenza del Livello Intermedio B1 attraverso la certificazione PLIDA, nella sede dellAssociazione di Dante Alighieri.</li></td></tr><tr><td valign=center>I Centri certificatori PLIDA si trovano in tutto il mondo, visita il sito <a href="http://www.plida.it" target="_blank">www.plida.it</a></td></tr></table></center><p></p>» <font color=blue><u>Prova il Corso di Preparazione alla Certificazione del Livello B1:</u> Chiedere disponibilit.</font><br><br></td></tr></table><br><br><hr><br><br><center><table border=1 cellspacing="1"><tr><td><table border=0 cellspacing="1"><tr><td> &nbsp; &nbsp; &nbsp; &nbsp; </td><td><table border=0 cellspacing="1"><tr><td valign=center><h1><i>Con il Certificato PLIDA si pu :</i></h1></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Richiedere il permesso di soggiorno in Italia (dal livello A2);</li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Richiedere il permesso di lungo soggiorno in Italia (carta di soggiorno CE - dal livello A2);</li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Iscriversi allUniversit italiana (il livello richiesto varia in base ai singoli atenei e al tipo di facolt);  &nbsp; </li></td></tr><tr><td valign=center> &nbsp; &nbsp; &nbsp; <li>Richiedere il visto d function renderMenu() {
    const ul = document.getElementById("menu");
    ul.innerHTML = "";
    /*if (

    textos[idioma].menu.forEach((txt, i) => {
        if (secciones[i] === "area" && !usuario) return;

}

function cargar(sec) {
    if (sec === "area" && !usuario) {
        abrirLogin();
        return;
    }
    document.getElementById("contenido").innerHTML = textos[idioma].contenido[sec];
}

function cambiarIdioma(l) {
    idioma = l;
    localStorage.setItem("idioma", idioma);
    renderMenu();
    cargar("inicio");
}

function abrirLogin() {
    document.getElementById("loginModal").classList.add("show");
}

function cerrarLogin(e) {
    if (!e || e.target.id === "loginModal") {
        document.getElementById("loginModal").classList.remove("show");
    }
}

function login() {
    const u = user.value;
    const p = pass.value;

    if (u === "alumno" && p === "1234") {
        localStorage.setItem("usuario", u);
        usuario = u;
        cerrarLogin();
        init();
        cargar("area");
    } else {
        error.innerText = "Credenciales incorrectas";
    }
}

function logout() {
    localStorage.removeItem("usuario");
    usuario = null;
    init();
    cargar("inicio");
}

function init() {
    document.getElementById("langSelect").value = idioma;
    document.getElementById("authBtn").innerHTML = usuario
        ? `<div class="logout-btn" onclick="logout()">${textos[idioma].logout}</div>`
        : `<div class="login-btn" onclick="abrirLogin()">${textos[idioma].login}</div>`;
    renderMenu();
}

    textos[idioma].menu.forEach((txt,i)=>{
        if (secciones[i] === "area" && !usuario) return;
        ul.innerHTML += `<li onclick="cargar('${secciones[i]}')">${txt}</li>`;
    });
}
